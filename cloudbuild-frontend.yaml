steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - "gcr.io/$PROJECT_ID/capstone-agentic-ai-frontend:$COMMIT_SHA"
      - --build-arg
      - NEXT_PUBLIC_API_URL=$$BACKEND_URL
      - frontend/
    secretEnv:
      - BACKEND_URL

  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - "gcr.io/$PROJECT_ID/capstone-agentic-ai-frontend:$COMMIT_SHA"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - capstone-agentic-ai-frontend
      - --image=gcr.io/$PROJECT_ID/capstone-agentic-ai-frontend:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/backend-url/versions/latest
      env: BACKEND_URL
