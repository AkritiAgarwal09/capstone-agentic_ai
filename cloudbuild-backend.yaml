steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - "gcr.io/$PROJECT_ID/capstone-agentic-ai-backend:$COMMIT_SHA"
      - backend/

  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - "gcr.io/$PROJECT_ID/capstone-agentic-ai-backend:$COMMIT_SHA"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - capstone-agentic-ai-backend
      - --image=gcr.io/$PROJECT_ID/capstone-agentic-ai-backend:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --memory=1Gi
      - --timeout=300
      - --max-instances=1
      - --set-secrets=GEMINI_API_KEY=gemini-api-key:latest
images:
  - "gcr.io/$PROJECT_ID/capstone-agentic-ai-backend:$COMMIT_SHA"