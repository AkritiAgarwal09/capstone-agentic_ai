services:
  ollama:
    image: ollama/ollama:latest
    container_name: academic-copilot-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

  backend:
    build:
      context: ./backend
    container_name: capstone-agentic-ai-backend
    ports:
      - "8080:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434/v1
    depends_on:
      - ollama

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: https://capstone-agentic-ai-backend-3j5mi36wwa-uc.a.run.app
    container_name: capstone-agentic-ai-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  ollama-data: